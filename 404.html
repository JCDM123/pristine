/* ════════════════════════════════════════════════
   PRISTINE WELLNESS — MASTER CSS
   Applied to every page for full consistency
   ════════════════════════════════════════════════ */

/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Jost', sans-serif;
  font-size: 16px; color: #111;
  -webkit-font-smoothing: antialiased;
  line-height: 1.7;
}
a { text-decoration: none; color: inherit; cursor: pointer; }
img { max-width: 100%; display: block; }

/* ── TYPOGRAPHY SCALE ── */
h1, h2, h3, h4, h5 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 400;
  color: #111; line-height: 1.1;
}
.page-title, .about-header h1 { font-size: 52px; }

h2, .feat-title, .section-title,
.story-text h2, .philosophy-section h2,
.pillars-header h2, .mentor-text h2,
.principles-header h2, .contact-text h2,
.article-text h2, .method-title,
.comments-title, .related-heading {
  font-size: clamp(28px, 4vw, 48px) !important;
  font-family: 'Cormorant Garamond', serif !important;
  font-style: italic !important; font-weight: 400 !important;
  color: #111 !important; line-height: 1.1 !important;
  margin-bottom: 1.2rem;
}
.card-title {
  font-size: 22px !important;
  font-family: 'Cormorant Garamond', serif !important;
  font-style: italic !important; font-weight: 500 !important;
  color: #111 !important; line-height: 1.3 !important;
}

/* ── BODY TEXT ── */
p, li, .card-excerpt, .feat-excerpt,
.article-text p, .article-intro,
.recipe-intro, .chef-tip p, .step-text,
.story-text p, .philosophy-lead,
.pillar-text, .mentor-text p,
.principle-content p, .contact-text p,
.author-bio-text, .comment-text,
.feed-post-text, .legal-section p,
.legal-section li {
  font-size: 17px !important;
  color: #444 !important; font-weight: 400 !important;
  line-height: 1.85 !important;
  font-family: 'Jost', sans-serif !important;
}
.step-title, .pillar-title, .principle-content h3 {
  color: #111 !important; font-weight: 500 !important;
}
.card-date, .card-time, .feat-meta,
.article-date, .article-rt, .related-meta,
.feed-post-date, .comment-date {
  font-size: 12px !important; color: #888 !important; font-weight: 400 !important;
}
.pull-quote blockquote {
  font-size: clamp(20px, 2.5vw, 26px) !important;
  font-family: 'Cormorant Garamond', serif !important;
  font-style: italic !important; color: #111 !important;
}
.about-tagline, .page-tagline {
  font-size: clamp(16px, 2vw, 22px) !important;
  color: #888 !important; font-weight: 300 !important;
  font-style: italic !important;
  font-family: 'Cormorant Garamond', serif !important;
}
.eyebrow, .feat-cat, .section-eyebrow,
.nl-eyebrow, .article-cat {
  font-size: 10px !important; letter-spacing: 3px !important;
  text-transform: uppercase !important;
  font-weight: 500 !important;
  font-family: 'Jost', sans-serif !important;
}

/* ── NAV ── */
.nav {
  padding: 0.8rem 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 0.5px solid var(--border);
  background: #fff; position: sticky; top: 0; z-index: 200;
  min-height: 90px; overflow: visible;
  transition: min-height 0.4s ease, padding 0.4s ease;
}
.nav.scrolled { min-height: 64px; padding: 0.6rem 2.5rem; box-shadow: 0 1px 0 var(--border); }
.nav-links { display: flex; gap: 2rem; align-items: center; }
.nav-links a {
  font-size: 11px !important; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted) !important;
  font-weight: 500 !important; transition: color 0.2s; text-decoration: none;
}
.nav-links a:hover { color: var(--sage) !important; }
.nav-links a.active {
  color: var(--text) !important;
  border-bottom: 1.5px solid var(--sage); padding-bottom: 2px;
}
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-right svg { width: 20px; height: 20px; stroke: #aaa; fill: none; stroke-width: 1.5; cursor: pointer; transition: stroke 0.2s; }
.nav-right svg:hover { stroke: var(--sage); }
.logo-img {
  width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
  flex-shrink: 0; cursor: pointer;
  filter: drop-shadow(0 6px 20px rgba(0,0,0,0.2));
  position: relative; z-index: 10; margin-bottom: -36px;
  transition: width 0.4s ease, height 0.4s ease, margin-bottom 0.4s ease, filter 0.4s ease;
}
.nav.scrolled .logo-img { width: 52px !important; height: 52px !important; margin-bottom: 0 !important; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1)); }

/* Mobile menu button */
.mobile-menu-btn {
  display: none; flex-direction: column; gap: 5px;
  cursor: pointer; padding: 4px; background: none; border: none;
}
.mobile-menu-btn span {
  display: block; width: 22px; height: 1.5px;
  background: #aaa; transition: all 0.3s ease;
}
.mobile-menu-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.mobile-menu-btn.open span:nth-child(2) { opacity: 0; }
.mobile-menu-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* Mobile drawer */
.mobile-drawer {
  position: fixed; top: 0; right: -100%; width: 80%; max-width: 320px;
  height: 100vh; background: #fff; z-index: 1000;
  padding: 5rem 2.5rem 3rem;
  transition: right 0.35s ease;
  box-shadow: -8px 0 40px rgba(0,0,0,0.12);
  display: flex; flex-direction: column; gap: 0;
  overflow-y: auto;
}
.mobile-drawer.open { right: 0; }
.mobile-drawer-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 999; opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.mobile-drawer-overlay.open { opacity: 1; pointer-events: all; }
.mobile-drawer a {
  display: block; padding: 1.2rem 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
  color: #111; font-weight: 500; font-family: 'Jost', sans-serif;
  transition: color 0.2s;
}
.mobile-drawer a:last-child { border-bottom: none; }
.mobile-drawer a:hover { color: var(--sage); }
.mobile-drawer-socials {
  display: flex; gap: 1.5rem; margin-top: auto; padding-top: 2rem;
}
.mobile-drawer-socials svg { width: 20px; height: 20px; stroke: #bbb; fill: none; stroke-width: 1.5; cursor: pointer; }
.mobile-drawer-socials svg:hover { stroke: var(--sage); }
.mobile-drawer-close {
  position: absolute; top: 1.5rem; right: 1.5rem;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--border-light); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #888;
}

/* ── HOVER EFFECTS — everything clickable ── */
.card { transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; }
.card:hover { transform: translateY(-5px); box-shadow: 0 16px 48px rgba(0,0,0,0.1); }
.card:hover .card-title { color: var(--sage-dark) !important; }
.card:hover .card-img-inner { transform: scale(1.04); }
.card-img-inner { transition: transform 0.5s ease; }

.featured { cursor: pointer; transition: box-shadow 0.3s ease; }
.featured:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.1); }
.featured:hover .feat-img-inner { transform: scale(1.03); }
.feat-img-inner { transition: transform 0.5s ease; }

.related-card { transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; }
.related-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.08); }

.read-link { transition: all 0.2s; }
.read-link:hover { gap: 12px; color: var(--sage); border-color: var(--sage); }

.filter-pill { transition: all 0.2s; }
.filter-pill:hover { border-color: var(--sage); color: var(--sage); }

.page-btn { transition: all 0.2s; cursor: pointer; }
.page-btn:not(.active):hover { border-color: var(--sage); color: var(--sage); }

/* ── NEWSLETTER ── */
.newsletter-wrap { border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 3rem; }
.nl-inner { padding: 5rem 4rem; text-align: center; position: relative; z-index: 1; }
.nl-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #a8bb8a; display: block; margin-bottom: 16px; font-weight: 500; }
.newsletter-wrap h3 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 56px; color: #fff; margin-bottom: 14px; font-weight: 400; }
.newsletter-wrap p { font-size: 17px !important; color: rgba(255,255,255,0.75) !important; margin-bottom: 2.5rem; line-height: 1.8; max-width: 480px; margin-left: auto; margin-right: auto; font-weight: 300 !important; }
.nl-form { display: flex; gap: 0; max-width: 460px; margin: 0 auto; border-radius: 4px; overflow: hidden; }
.nl-form input { flex: 1; padding: 16px 22px; border: none; background: rgba(255,255,255,0.95); font-size: 15px; color: #333; outline: none; font-family: 'Jost', sans-serif; font-weight: 300; }
.nl-form button { padding: 16px 28px; background: var(--sage); border: none; color: #fff; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; font-family: 'Jost', sans-serif; font-weight: 500; white-space: nowrap; transition: background 0.2s; }
.nl-form button:hover { background: var(--sage-dark); }
.nl-spam { font-size: 12px !important; color: rgba(255,255,255,0.4) !important; margin-top: 1rem; font-weight: 300 !important; }
.nl-pdf { display: block; font-size: 13px; color: rgba(168,187,138,0.9); margin-top: 0.8rem; font-weight: 400; font-style: italic; }

/* ── FOOTER ── */
.footer { background: #fafaf8; border-top: 0.5px solid var(--border); }
.footer-inner { padding: 2rem 2.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
.footer-copy { font-size: 12px; color: #bbb; font-weight: 300; }
.footer-links { display: flex; gap: 2rem; flex-wrap: wrap; }
.footer-links a { font-size: 10px !important; letter-spacing: 1.5px; text-transform: uppercase; color: #bbb; font-weight: 400 !important; transition: color 0.2s; cursor: pointer; }
.footer-links a:hover { color: var(--sage); }
.footer-socials { display: flex; gap: 14px; align-items: center; }
.footer-socials svg { width: 18px; height: 18px; stroke: #ccc; fill: none; stroke-width: 1.5; cursor: pointer; transition: stroke 0.2s; }
.footer-socials svg:hover { stroke: var(--sage); }

/* ── BACK TO TOP ── */
.back-to-top {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 300;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--sage); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s, background 0.2s;
  box-shadow: 0 4px 20px rgba(138,155,110,0.4);
}
.back-to-top.visible { opacity: 1; transform: translateY(0); }
.back-to-top:hover { background: var(--sage-dark); }
.back-to-top svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; }

/* ── SEARCH OVERLAY ── */
.search-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.97);
  z-index: 500; display: flex; flex-direction: column;
  align-items: center; padding: 8rem 5% 4rem;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.search-overlay.open { opacity: 1; pointer-events: all; }
.search-close {
  position: absolute; top: 2rem; right: 2.5rem;
  font-size: 28px; color: #bbb; cursor: pointer;
  background: none; border: none; transition: color 0.2s;
}
.search-close:hover { color: #111; }
.search-input-wrap {
  width: 100%; max-width: 680px;
  border-bottom: 2px solid #111; display: flex; align-items: center; gap: 1rem;
  padding-bottom: 1rem; margin-bottom: 3rem;
}
.search-input-wrap svg { width: 22px; height: 22px; stroke: #bbb; fill: none; stroke-width: 1.5; flex-shrink: 0; }
.search-input {
  flex: 1; border: none; outline: none;
  font-size: 28px; font-family: 'Cormorant Garamond', serif;
  font-style: italic; color: #111; background: transparent;
}
.search-input::placeholder { color: #ccc; }
.search-results { width: 100%; max-width: 680px; }
.search-result-item {
  display: flex; gap: 1.5rem; align-items: flex-start;
  padding: 1.5rem 0; border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: all 0.2s;
}
.search-result-item:hover { padding-left: 8px; }
.search-result-item:hover .search-result-title { color: var(--sage); }
.search-result-cat { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--sage); font-weight: 500; display: block; margin-bottom: 4px; }
.search-result-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; color: #111; line-height: 1.2; margin-bottom: 4px; transition: color 0.2s; }
.search-result-excerpt { font-size: 13px; color: #888; font-weight: 300; line-height: 1.6; }
.search-empty { text-align: center; padding: 3rem 0; }
.search-empty p { font-size: 16px; color: #bbb; font-weight: 300; }

/* ── ESSENTIAL READING — mobile stack ── */

.error-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:4rem 2.5rem;text-align:center;position:relative;}
.error-num{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:180px;font-weight:400;color:#111;line-height:1;opacity:0.06;position:absolute;user-select:none;pointer-events:none;}
.error-content{position:relative;z-index:1;}
.error-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(36px,5vw,56px);font-weight:400;color:#111;line-height:1.1;margin-bottom:1.5rem;}
.error-text{font-size:17px;color:#888;line-height:1.8;font-weight:300;max-width:480px;margin:0 auto 3rem;}
.error-links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem;}
.error-btn-primary{padding:14px 32px;background:var(--sage);border-radius:4px;color:#fff;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'Jost',sans-serif;font-weight:500;transition:background 0.2s;}
.error-btn-primary:hover{background:var(--sage-dark);}
.error-btn-secondary{padding:14px 32px;border:0.5px solid var(--border);border-radius:4px;color:#888;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'Jost',sans-serif;font-weight:500;transition:all 0.2s;}
.error-btn-secondary:hover{border-color:var(--sage);color:var(--sage);}
.error-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;max-width:800px;margin:0 auto;text-align:left;}
.error-card{border:0.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.3s,box-shadow 0.3s;}
.error-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.08);}
.error-card-img{height:120px;background-size:cover;background-position:center;}
.error-card-body{padding:1.2rem;background:#fff;}
.error-card-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--sage);font-weight:500;display:block;margin-bottom:6px;}
.error-card-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;font-weight:400;color:#111;line-height:1.3;}

window.addEventListener('scroll', function() {

function openMobileMenu() {

}

// ── SEARCH ──
var searchIndex, searchDocs = [];

function buildSearchIndex() {
  searchDocs = [
    { title: 'The Ancient Power of Forest Bathing', cat: 'Mental Wellness', excerpt: 'Discover how Shinrin-yoku can lower cortisol, strengthen immunity and restore a calm, clear mind.', url: 'article-forest-bathing.html' },
    { title: 'What Robert Gourlay Taught Us About Water', cat: 'Hydration', excerpt: 'The structured water science that may explain everything about human health and longevity.', url: 'article-forest-bathing.html' },
    { title: 'The Six Pillars of Pristine Living', cat: 'Foundations', excerpt: 'Pure water, nutrient dense food, grounding, nature immersion, restorative sleep and intentional living.', url: 'the-source.html' },
    { title: 'Chickpea & Green Bean Curry', cat: 'Recipes · Mains', excerpt: 'A warming plant-based curry loaded with anti-inflammatory turmeric, cumin and coconut milk.', url: 'recipe-chickpea-curry.html' },
    { title: 'Morning Olive Oil & Lemon Elixir', cat: 'Recipes · Drinks', excerpt: 'The ancient morning ritual that supports liver health and natural detoxification.', url: 'recipe-chickpea-curry.html' },
    { title: 'Avocado Chocolate Mousse', cat: 'Recipes · Desserts', excerpt: 'Rich, creamy and packed with healthy fats, guilt-free indulgence at its finest.', url: 'recipe-chickpea-curry.html' },
    { title: 'About Pristine Wellness', cat: 'About', excerpt: 'A family on a mission to share what we know, rooted in ancestral wisdom.', url: 'about.html' },
    { title: 'Robert Gourlay, Water Quality Scientist', cat: 'About', excerpt: 'Founder of Phion, inventor of the MEA device, and our family\'s guiding mentor.', url: 'about.html' },
    { title: 'The Industrial Revolution That Disconnected Us', cat: 'Wellness', excerpt: 'Rubber soles, concrete floors, processed food, how modernity quietly stripped our health away.', url: 'the-source.html' },
    { title: 'Anti-Inflammatory Foods: Building Your Daily Plate', cat: 'Nutrition', excerpt: 'Simple evidence-backed choices that calm the body from the inside out.', url: 'the-source.html' },
  ];
  if (typeof lunr !== 'undefined') {
    searchIndex = lunr(function() {
      this.field('title', { boost: 10 });
      this.field('cat', { boost: 5 });
      this.field('excerpt');
      this.ref('url');
      searchDocs.forEach(function(doc, i) {
        this.add({ url: doc.url + '_' + i, title: doc.title, cat: doc.cat, excerpt: doc.excerpt });
      }, this);
    });
  }
}

function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').focus();
  document.body.style.overflow = 'hidden';
  if (!searchIndex) buildSearchIndex();
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  document.body.style.overflow = '';
}

function doSearch(q) {
  var results = document.getElementById('search-results');
  if (!q || q.length < 2) { results.innerHTML = ''; return; }
  var matches = [];
  if (searchIndex) {
    try {
      var r = searchIndex.search(q + '*');
      r.forEach(function(item) {
        var idx = parseInt(item.ref.split('_').pop());
        if (searchDocs[idx]) matches.push(searchDocs[idx]);
      });
    } catch(e) {}
  }
  // Fallback: simple text match
  if (matches.length === 0) {
    var ql = q.toLowerCase();
    searchDocs.forEach(function(doc) {
      if (doc.title.toLowerCase().includes(ql) || doc.excerpt.toLowerCase().includes(ql) || doc.cat.toLowerCase().includes(ql)) {
        matches.push(doc);
      }
    });
  }
  if (matches.length === 0) {
    results.innerHTML = '<div class="search-empty"><p>No results for "' + q + '", try another search.</p></div>';
    return;
  }
  results.innerHTML = matches.map(function(doc) {
    return '<div class="search-result-item" onclick="window.location=\'' + doc.url + '\'">' +
      '<div><span class="search-result-cat">' + doc.cat + '</span>' +
      '<div class="search-result-title">' + doc.title + '</div>' +
      '<div class="search-result-excerpt">' + doc.excerpt + '</div></div>' +
      '</div>';
  }).join('');
}

function closeContactModal() { var m=document.getElementById('contact-modal');m.classList.remove('open');setTimeout(function(){m.style.display='none';},300);document.body.style.overflow=''; }
function handleModalClick(e) { if (e.target === document.getElementById('contact-modal')) closeContactModal(); }

// ── COPY LINK ──
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    var btn = document.getElementById('copy-btn');
    if (!btn) return;
    var orig = btn.innerHTML;
    btn.innerHTML = '✓ Copied!';
    btn.style.borderColor = 'var(--sage)'; btn.style.color = 'var(--sage)';
    setTimeout(function() { btn.innerHTML = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
  });
}

// ── KEYBOARD ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeContactModal(); closeSearch(); closeMobileMenu(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});

document.addEventListener('DOMContentLoaded', function() {
  buildSearchIndex();
});

function initFilters() {
  var pills = document.querySelectorAll('.filter-pill');
  if (!pills.length) return;
  pills.forEach(function(pill) {
    pill.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      // Set active
      pills.forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      var cat = pill.textContent.trim();
      filterCards(cat);
    });
  });
}

function filterCards(cat) {
  var cards = document.querySelectorAll('.card[data-cat], .card');
  cards.forEach(function(card) {
    if (cat === 'All') {
      card.style.display = '';
    } else {
      var cardCat = card.getAttribute('data-cat') || '';
      card.style.display = (cardCat === cat || cardCat.indexOf(cat) > -1) ? '' : 'none';
    }
  });
}

// ── FIX 7: Mobile drawer legal submenu ──
function initLegalSubmenu() {
  var toggle = document.getElementById('legal-toggle');
  if (!toggle) return;
  toggle.addEventListener('click', function() {
    var sub = document.getElementById('legal-subnav');
    var isOpen = sub.classList.contains('open');
    sub.classList.toggle('open');
    toggle.classList.toggle('open');
  });
}

// ── FIX 8 & 10: Recipe timers ──
var activeTimers = {};

function startStepTimer(stepId, seconds) {
  if (activeTimers[stepId]) return;
  var display = document.getElementById('timer-' + stepId);
  var btn = document.getElementById('timer-btn-' + stepId);
  if (!display) return;
  var remaining = seconds;
  if (btn) btn.textContent = 'Stop';
  activeTimers[stepId] = setInterval(function() {
    remaining--;
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (remaining <= 0) {
      clearInterval(activeTimers[stepId]);
      delete activeTimers[stepId];
      display.textContent = 'Done!';
      if (btn) btn.textContent = 'Start';
      // Vibrate on mobile
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
  }, 1000);
  var m = Math.floor(remaining / 60);
  var s = remaining % 60;
  display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
}

function stopStepTimer(stepId, originalSeconds) {
  if (activeTimers[stepId]) {
    clearInterval(activeTimers[stepId]);
    delete activeTimers[stepId];
  }
  var display = document.getElementById('timer-' + stepId);
  var btn = document.getElementById('timer-btn-' + stepId);
  if (display) {
    var m = Math.floor(originalSeconds / 60);
    var s = originalSeconds % 60;
    display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }
  if (btn) btn.textContent = 'Start';
}

function toggleStepTimer(stepId, seconds) {
  if (activeTimers[stepId]) {
    stopStepTimer(stepId, seconds);
  } else {
    startStepTimer(stepId, seconds);
  }
}

// ── FIX 10: Servings calculator ──
function initServings() {
  var btns = document.querySelectorAll('.serving-btn');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var action = btn.getAttribute('data-action');
      var countEl = document.getElementById('serving-count');
      if (!countEl) return;
      var current = parseInt(countEl.textContent) || 4;
      var base = parseInt(document.getElementById('serving-base') ? document.getElementById('serving-base').value : current) || current;
      if (action === 'up') current++;
      if (action === 'down' && current > 1) current--;
      countEl.textContent = current;
      // Scale ingredients
      var ratio = current / base;
      document.querySelectorAll('[data-base-amount]').forEach(function(el) {
        var baseAmt = parseFloat(el.getAttribute('data-base-amount'));
        var scaled = (baseAmt * ratio);
        el.textContent = scaled % 1 === 0 ? scaled.toString() : scaled.toFixed(1);
      });
    });
  });
}

// ── FIX 10: Metric/Imperial toggle ──
function initUnitToggle() {
  var btns = document.querySelectorAll('.unit-btn');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      btns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var unit = btn.getAttribute('data-unit');
      document.querySelectorAll('[data-metric]').forEach(function(el) {
        el.textContent = unit === 'metric' ? el.getAttribute('data-metric') : el.getAttribute('data-imperial');
      });
    });
  });
}

// ── INIT ALL ──
document.addEventListener('DOMContentLoaded', function() {
  initFilters();
  initLegalSubmenu();
  initServings();
  initUnitToggle();
});

</script>
