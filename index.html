<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pristine Wellness, Coming Soon</title>
<meta name="description" content="Evidence-based wellness and wholefood living rooted in ancestral wisdom. Launching soon.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #8F9574;
    --forest: #2C4A2E;
    --cream: #F5F0E8;
    --gold: #C9A96E;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Jost', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Full bleed image */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.4s ease-in-out;
  }

  .slide.active {
    opacity: 1;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }

  /* Subtle left vignette for text readability only */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(0,0,0,0.45) 0%,
      rgba(0,0,0,0.15) 50%,
      rgba(0,0,0,0) 100%
    );
  }

  /* Grain */
  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    z-index: 1;
    pointer-events: none;
  }

  /* Content */
  .wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 0 8vw;
    max-width: 720px;
    width: 100%;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-mark {
    width: 140px;
    height: 140px;
    margin-bottom: 2rem;
    animation: fadeUp 1.2s 0.1s ease forwards;
    opacity: 0;
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 100%;
    height: 100%;
  }



  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(62px, 11vw, 130px);
    color: var(--cream);
    line-height: 0.95;
    letter-spacing: -2px;
    margin-bottom: 2rem;
    text-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
    animation: fadeUp 1.2s 0.2s ease forwards;
    opacity: 0;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    opacity: 0.7;
    margin-bottom: 1.8rem;
    animation: fadeUp 1.2s 0.3s ease forwards;
    opacity: 0;
  }

  .subtext {
    font-size: 17px;
    font-weight: 300;
    color: rgba(245,240,232,0.88);
    line-height: 1.85;
    max-width: 420px;
    margin-bottom: 1.2rem;
  }

  .socials {
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  .socials a {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(245,240,232,0.9);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .socials a:hover {
    color: #fff;
  }

  .copyright {
    position: fixed;
    bottom: 2rem;
    right: 2.5rem;
    font-size: 12px;
    letter-spacing: 2px;
    color: rgba(245,240,232,0.2);
    text-transform: uppercase;
    z-index: 10;
  }

  @media (max-width: 600px) {
    .wrap {
      padding: 0 6vw;
      align-items: center;
      text-align: center;
    }
    .divider { margin-left: auto; margin-right: auto; }
    .subtext { max-width: 100%; }
    .socials { justify-content: center; gap: 1.5rem; }
    .copyright { right: 50%; transform: translateX(50%); }
  }
</style>
</head>
